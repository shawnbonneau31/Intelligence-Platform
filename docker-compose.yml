version: '3.8'

services:
  namara-platform:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NAMARA_SECRET=${NAMARA_SECRET:-namara-production-secret-2026}
      - DEBUG=false
    volumes:
      - namara-data:/app/data
    restart: unless-stopped

volumes:
  namara-data:
